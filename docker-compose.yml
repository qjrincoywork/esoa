version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: esoa_app
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: production
      APP_DEBUG: "false"

  redis:
    image: redis:7-alpine
    container_name: esoa_redis
    restart: unless-stopped

volumes:
  redis_data:
