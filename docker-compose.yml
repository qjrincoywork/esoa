version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: esoa_app
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_CLIENT: phpredis
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: esoa_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  redis_data:
